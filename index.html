<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trilingual</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trilingual">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #f4f4f8; --card: #ffffff; --ink: #1c1c28; --muted: #6b7280;
    --accent: #4f46e5; --accent-soft: #eef2ff; --border: #e5e7eb;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111118; --card: #1c1c28; --ink: #f0f0f5; --muted: #9ca3af;
      --accent: #818cf8; --accent-soft: #26263a; --border: #2e2e40;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--ink);
    padding: max(12px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    max-width: 560px; margin: 0 auto;
    -webkit-text-size-adjust: 100%;
  }
  header { display: flex; align-items: center; justify-content: space-between; padding: 6px 2px 14px; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tabs button {
    flex: 1; padding: 10px 0; font-size: 15px; font-weight: 600;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--card); color: var(--muted); cursor: pointer;
    transition: all .15s;
  }
  .tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  textarea {
    width: 100%; min-height: 92px; padding: 14px; font-size: 17px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--card); color: var(--ink); resize: vertical; outline: none;
    font-family: inherit;
  }
  textarea:focus { border-color: var(--accent); }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  #goBtn {
    flex: 1; padding: 13px; font-size: 16px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    cursor: pointer;
  }
  #goBtn:disabled { opacity: .5; }
  #clearBtn {
    padding: 13px 16px; font-size: 15px; background: var(--card); color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
  }
  #status { text-align: center; font-size: 13px; color: var(--muted); min-height: 20px; padding: 6px 0; }
  #status.error { color: #dc2626; }
  .result {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px 14px; margin-bottom: 10px; cursor: pointer; display: none;
    position: relative;
  }
  .speak {
    position: absolute; top: 8px; right: 10px;
    background: var(--accent-soft); color: var(--accent);
    border: none; border-radius: 8px;
    padding: 7px 10px 5px; cursor: pointer; line-height: 0;
  }
  .result .lang { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); margin-bottom: 5px; }
  .result .text { font-size: 18px; line-height: 1.45; word-wrap: break-word; }
  .result .pinyin { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .result .alts { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .result .alt2 { font-size: 12px; color: var(--muted); margin-top: 4px; opacity: .75; font-style: italic; }
  .result .copied { font-size: 11px; color: #16a34a; margin-top: 4px; display: none; }
  h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 18px 2px 8px; display: flex; justify-content: space-between; align-items: center; }
  #clearHist { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-transform: none; letter-spacing: 0; }
  .histItem {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 6px; cursor: pointer; font-size: 15px;
  }
  .histItem .hTop { display: flex; gap: 8px; align-items: baseline; }
  .histItem .hLang { font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 2px 6px; border-radius: 6px; flex-shrink: 0; }
  .histItem .hText { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .histItem .hTrans {
    font-size: 13px; color: var(--muted); margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>Trilingual <span>译</span></h1>
</header>

<div class="tabs" id="tabs">
  <button data-lang="zh-CN">中文</button>
  <button data-lang="en">English</button>
  <button data-lang="nl">Nederlands</button>
</div>

<textarea id="input" placeholder="Type a word or sentence…" autocapitalize="off" autocorrect="off"></textarea>

<div class="actions">
  <button id="goBtn">Translate</button>
  <button id="clearBtn">✕</button>
</div>

<div id="status"></div>

<div class="result" id="res0">
  <div class="lang"></div>
  <button class="speak" title="Pronounce"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg></button>
  <div class="text"></div>
  <div class="pinyin"></div>
  <div class="alts"></div>
  <div class="alt2"></div>
  <div class="copied">Copied ✓</div>
</div>
<div class="result" id="res1">
  <div class="lang"></div>
  <button class="speak" title="Pronounce"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg></button>
  <div class="text"></div>
  <div class="pinyin"></div>
  <div class="alts"></div>
  <div class="alt2"></div>
  <div class="copied">Copied ✓</div>
</div>

<h2>History <button id="clearHist">clear</button></h2>
<div id="history"></div>

<script>
const LANGS = { 'zh-CN': '中文', 'en': 'English', 'nl': 'Nederlands' };
const $ = id => document.getElementById(id);

let srcLang = localStorage.getItem('tri_lang') || 'zh-CN';
let history = JSON.parse(localStorage.getItem('tri_hist') || '[]');

/* ---------- tabs ---------- */
function renderTabs() {
  document.querySelectorAll('#tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === srcLang));
}
$('tabs').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  srcLang = b.dataset.lang;
  localStorage.setItem('tri_lang', srcLang);
  renderTabs();
});
renderTabs();

/* ---------- translate (free endpoints, no API key) ---------- */
let usedFallback = false;

/* Google endpoint: dt=t gives the translation, dt=bd adds dictionary
   alternatives for single words */
async function fetchGoogle(text, source, target) {
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&dt=t&dt=bd'
    + '&sl=' + source + '&tl=' + target + '&q=' + encodeURIComponent(text);
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  const main = d[0].map(seg => seg[0]).join('');
  let alts = [];
  if (Array.isArray(d[1])) {
    d[1].forEach(entry => { if (Array.isArray(entry[1])) alts.push(...entry[1]); });
  }
  alts = [...new Set(alts)]
    .filter(a => a.toLowerCase() !== main.toLowerCase())
    .slice(0, 6);
  return { main, alts };
}

/* MyMemory: second opinion / fallback */
async function fetchMyMemory(text, source, target) {
  const r = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text)
    + '&langpair=' + source + '|' + target);
  const d = await r.json();
  if (d.responseStatus !== 200) throw new Error(d.responseDetails || 'translation failed');
  return d.responseData.translatedText;
}

/* ask both services; Google is the main answer, MyMemory is shown as a
   second opinion (or becomes the main answer if Google is down) */
async function gTranslate(text, source, target) {
  const [g, m] = await Promise.allSettled([
    fetchGoogle(text, source, target),
    fetchMyMemory(text, source, target)
  ]);
  if (g.status === 'fulfilled') {
    const mm = (m.status === 'fulfilled'
      && m.value.trim().toLowerCase() !== g.value.main.trim().toLowerCase())
      ? m.value : null;
    return { main: g.value.main, alts: g.value.alts, mm };
  }
  if (m.status === 'fulfilled') {
    usedFallback = true;
    return { main: m.value, alts: [], mm: null };
  }
  throw new Error(g.reason?.message || 'no service reachable');
}

let pinyinReady = null;
function loadPinyin() {
  if (!pinyinReady) {
    pinyinReady = new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  return pinyinReady;
}

async function translate(text) {
  text = text.trim();
  if (!text) return;

  const targets = Object.keys(LANGS).filter(l => l !== srcLang);
  $('goBtn').disabled = true;
  setStatus('Translating…');
  ['res0','res1'].forEach(id => $(id).style.display = 'none');

  try {
    usedFallback = false;
    const results = await Promise.all(targets.map(t =>
      gTranslate(text, srcLang, t)));
    setStatus(usedFallback ? '⚠️ Google endpoint unavailable — using backup service (quality may be lower).' : '');
    for (let i = 0; i < 2; i++) showResult(i, targets[i], results[i]);
    addHistory(text, srcLang, { [targets[0]]: results[0], [targets[1]]: results[1] });
  } catch (err) {
    setStatus('Error: ' + err.message, true);
  } finally {
    $('goBtn').disabled = false;
  }
}

/* text-to-speech via the browser (works offline-free on iPhone) */
const VOICE_LANG = { 'zh-CN': 'zh-CN', 'en': 'en-US', 'nl': 'nl-NL' };
function speak(text, lang) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = VOICE_LANG[lang] || lang;
  u.rate = 0.95;
  speechSynthesis.speak(u);
}

async function showResult(i, lang, res) {
  const card = $('res' + i);
  card.dataset.lang = lang;
  card.querySelector('.lang').textContent = LANGS[lang];
  card.querySelector('.text').textContent = res.main;
  card.querySelector('.alts').textContent =
    res.alts.length ? 'also: ' + res.alts.join(', ') : '';
  card.querySelector('.alt2').textContent =
    res.mm ? 'MyMemory: ' + res.mm : '';
  const py = card.querySelector('.pinyin');
  py.textContent = '';
  if (lang === 'zh-CN') {
    try {
      await loadPinyin();
      py.textContent = pinyinPro.pinyin(res.main);
    } catch (e) { /* pinyin is optional */ }
  }
  card.style.display = 'block';
}

function setStatus(msg, isError) {
  const s = $('status');
  s.textContent = msg;
  s.className = isError ? 'error' : '';
}

/* speak button */
['res0','res1'].forEach(id => $(id).querySelector('.speak').addEventListener('click', e => {
  e.stopPropagation(); // don't trigger the copy-on-tap below
  const card = $(id);
  speak(card.querySelector('.text').textContent, card.dataset.lang);
}));

/* copy result on tap */
['res0','res1'].forEach(id => $(id).addEventListener('click', async () => {
  const card = $(id);
  try {
    await navigator.clipboard.writeText(card.querySelector('.text').textContent);
    const c = card.querySelector('.copied');
    c.style.display = 'block';
    setTimeout(() => c.style.display = 'none', 1200);
  } catch (e) {}
}));

/* ---------- history ---------- */
function addHistory(text, lang, results) {
  history = history.filter(h => !(h.t === text && h.l === lang));
  history.unshift({ t: text, l: lang, r: results });
  history = history.slice(0, 100);
  localStorage.setItem('tri_hist', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  $('history').innerHTML = '';
  history.forEach(h => {
    const d = document.createElement('div');
    d.className = 'histItem';
    const top = document.createElement('div');
    top.className = 'hTop';
    const tag = document.createElement('span');
    tag.className = 'hLang';
    tag.textContent = LANGS[h.l];
    const tx = document.createElement('span');
    tx.className = 'hText';
    tx.textContent = h.t;
    top.append(tag, tx);
    d.append(top);
    if (h.r) {
      Object.keys(h.r).forEach(lang => {
        const line = document.createElement('div');
        line.className = 'hTrans';
        line.textContent = h.r[lang].main;
        d.append(line);
      });
    }
    d.addEventListener('click', () => {
      srcLang = h.l; renderTabs();
      localStorage.setItem('tri_lang', srcLang);
      $('input').value = h.t;
      if (h.r) {
        // restore saved results instantly — no internet call needed
        setStatus('');
        Object.keys(h.r).forEach((lang, i) => showResult(i, lang, h.r[lang]));
      } else {
        translate(h.t); // old entry without saved results
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    $('history').appendChild(d);
  });
}
$('clearHist').addEventListener('click', () => {
  if (!confirm('Clear history?')) return;
  history = [];
  localStorage.setItem('tri_hist', '[]');
  renderHistory();
});
renderHistory();

/* ---------- input ---------- */
$('goBtn').addEventListener('click', () => translate($('input').value));
$('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); translate($('input').value); }
});
$('clearBtn').addEventListener('click', () => { $('input').value = ''; $('input').focus(); });
</script>
</body>
</html>
